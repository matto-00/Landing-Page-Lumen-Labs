<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Solicitud recibida! — Lumen Labs</title>
  <link rel="icon" type="image/png" href="assets/Lumen_isotipo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=neue-montreal@400,500,700&display=swap" rel="stylesheet">

  <style>
    /* ── DESIGN TOKENS ────────────────────────────────────────────────────── */
    :root {
      /* Base */
      --color-bg:        #050505;
      --color-surface:   #0A0A0A;
      --color-elevation: #121212;

      /* Accent */
      --color-orange:    #FF8A00;
      --color-amber:     #FFA726;
      --color-gold:      #FFC857;

      /* Texto */
      --color-text:      #FFFFFF;
      --color-secondary: #B0B0B0;
      --color-muted:     #777777;

      /* Gradiente */
      --gradient-brand: linear-gradient(135deg, #FF8A00 0%, #FFA726 45%, #FFC857 100%);

      /* Cards */
      --card-bg:     rgba(12,12,12,0.85);
      --card-border: 1px solid rgba(255,138,0,0.15);
      --card-radius: 20px;
      --card-shadow: 0 20px 60px rgba(255,138,0,0.12);

      /* Glass */
      --glass-bg:   rgba(20,20,20,0.65);
      --glass-blur: blur(20px);

      /* Glow */
      --glow-10: rgba(255,138,0,0.10);
      --glow-15: rgba(255,138,0,0.15);
      --glow-20: rgba(255,138,0,0.20);

      /* Botones */
      --btn-bg:         linear-gradient(135deg, #FF8A00, #FFA726);
      --btn-radius:     14px;
      --btn-sec-border: 1px solid rgba(255,138,0,0.25);

      /* Layout */
      --container-max: 1440px;
      --content-max:   1280px;

      /* Tipografía */
      --font-display: 'Neue Montreal', 'Inter', sans-serif;
      --font-body:    'Inter', sans-serif;

      /* Estructura */
      --nav-height: 64px;
    }

    /* ── RESET ────────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100dvh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ── CUSTOM SCROLLBAR ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar          { width: 6px; }
    ::-webkit-scrollbar-track    { background: var(--color-bg); }
    ::-webkit-scrollbar-thumb    { background: #92400E; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-amber); }

    /* ── NAVBAR (simplificado — siempre visible) ──────────────────────────── */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      z-index: 100;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo-full {
      display: block;
      height: 96px;
      width: auto;
    }

    .nav-logo-icon {
      display: none;
      height: 96px;
      width: auto;
    }

    @media (max-width: 767px) {
      .nav-logo-full { display: none; }
      .nav-logo-icon { display: block; }
    }

    .btn-back {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s ease;
    }

    .btn-back:hover {
      color: var(--color-text);
    }

    /* ── MAIN LAYOUT ──────────────────────────────────────────────────────── */
    main {
      padding-top: var(--nav-height);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-left: 5%;
      padding-right: 5%;
    }

    /* ── CONFIRMATION HEADER ──────────────────────────────────────────────── */
    .confirmation-header {
      text-align: center;
      padding: 60px 0 40px;
      max-width: 560px;
    }

    .confirmation-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--glow-10);
      border: 1px solid var(--glow-15);
      color: var(--color-amber);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .confirmation-header h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin-bottom: 16px;
      line-height: 1.15;
    }

    .confirmation-header p {
      color: var(--color-muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ── CALENDLY WRAPPER ─────────────────────────────────────────────────── */
    .calendly-wrapper {
      width: 100%;
      max-width: 800px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--card-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      margin-bottom: 60px;
    }

    /* ── MOBILE ───────────────────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .confirmation-header {
        padding: 40px 0 32px;
      }

      .confirmation-header h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────────────────────── -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <img src="assets/Lumen_Horizontal_logo2.png" alt="Lumen Labs" class="nav-logo-full" height="32">
      <img src="assets/Lumen_isotipo.png" alt="Lumen Labs" class="nav-logo-icon" height="32">
    </a>
    <a href="index.html" class="btn-back">← Volver al inicio</a>
  </nav>

  <!-- ── MAIN ────────────────────────────────────────────────────────────── -->
  <main>
    <div class="confirmation-header">
      <div class="confirmation-badge">✓ Solicitud recibida</div>
      <h1>¡Tu solicitud fue recibida!</h1>
      <p>Estamos revisando tus datos. Elige el horario que mejor te venga para tu llamada de diagnóstico gratuita con el equipo de Lumen Labs.</p>
    </div>

    <div class="calendly-wrapper">
      <!-- Reemplaza data-url con tu enlace real de Calendly antes del deploy -->
      <div class="calendly-inline-widget"
           data-url="https://calendly.com/TU-USUARIO"
           style="min-width:320px;height:630px;"></div>
    </div>
  </main>

  <script src="https://assets.calendly.com/assets/external/widget.js"></script>

</body>
</html>
